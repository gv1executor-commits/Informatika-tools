<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOW_NET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #00ff41;
    --cyan: #00ffff;
    --dim: #005c17;
    --bg: #000000;
    --border: #00ff4155;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 0;
  }

  .panel {
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    padding: 0;
  }

  .panel-title {
    text-align: center;
    border-bottom: 1px solid var(--border);
    padding: 3px 0;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--green);
    background: #001a00;
    position: sticky;
    top: 0;
  }

  .panel-content {
    padding: 4px 6px;
    height: calc(100% - 24px);
    overflow: hidden;
  }

  .line {
    white-space: nowrap;
    overflow: hidden;
    line-height: 1.5;
    text-overflow: ellipsis;
  }

  #panel-binary .line { color: var(--green); }
  #panel-terminal .line { color: var(--green); }
  #panel-syslog .line { color: var(--cyan); }
  #panel-netlog .line { color: var(--green); }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* CRT flicker */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.85; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  body { animation: flicker 8s infinite; }

  /* Glow effect on text */
  .line { text-shadow: 0 0 6px currentColor; }
</style>
</head>
<body>

<div class="panel" id="panel-binary">
  <div class="panel-title">[ BINARY STREAM ]</div>
  <div class="panel-content" id="binary-content"></div>
</div>

<div class="panel" id="panel-terminal">
  <div class="panel-title">[ TERMINAL ]</div>
  <div class="panel-content" id="terminal-content"></div>
</div>

<div class="panel" id="panel-syslog">
  <div class="panel-title">[ SYSTEM LOG ]</div>
  <div class="panel-content" id="syslog-content"></div>
</div>

<div class="panel" id="panel-netlog">
  <div class="panel-title">[ NETWORK LOG ]</div>
  <div class="panel-content" id="netlog-content"></div>
</div>

<script>
const commands = [
  "$ whoami",
  "root",
  "$ uname -a",
  "Linux shadow_kernel v3.1.7",
  "$ ls /system/core",
  "access.log exploit.sh backdoor.py",
  "$ sudo inject --force",
  "access granted...",
  "$ ./shadow_scan",
  "scanning network...",
  "target locked [OK]",
  "$ connect --hidden",
  "establishing secure tunnel...",
  "connected [OK]",
];

const logs = [
  "[ INIT SEQUENCE ]",
  "> loading_core.module ... OK",
  "> decrypting_payload_0x7A3F ... DONE",
  "> bypass.firewall.layer_3 ... SUCCESS",
  "> injecting.protocol://shadow_net ... ACTIVE",
  "",
  "$ root@system:~# access --override --silent",
  "$ scanning port [21][22][80][443] ...",
  "$ exploit_buffer.v2 injected...",
  "",
  "[ WARNING ] unauthorized access detected...",
  "masking identity... [##########]",
  "",
  ">>> kernel.exec(run_shadow_trace)",
  ">>> AI_node.status = CONNECTED",
  ">>> memory_fragment[0xFF12] corrupted...",
  "",
  "# echo 'we are inside'",
  "# chmod 777 /system/core",
  "# ./execute_backdoor.sh",
  "",
  "[ SIGNAL LOST... ]",
  "reconnecting...",
  "connection_established [OK]",
];

function randBin() {
  let row = '';
  for (let i = 0; i < 6; i++) {
    let byte = '';
    for (let b = 0; b < 8; b++) byte += Math.random() > 0.5 ? '1' : '0';
    row += byte + ' ';
  }
  return row.trim();
}

function fillPanel(containerId, lines, rows) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  for (let i = 0; i < rows; i++) {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = lines[i % lines.length];
    el.appendChild(div);
  }
}

function getRows(panelId) {
  const panel = document.getElementById(panelId).parentElement;
  const h = panel.clientHeight - 24;
  return Math.floor(h / 18);
}

let logIndex = 0;
let cmdIndex = 0;

function tick() {
  const rows = getRows('binary-content');

  // Binary panel — random every tick
  const binLines = Array.from({ length: rows }, () => randBin());
  fillPanel('binary-content', binLines, rows);

  // Terminal panel
  const cmdSlice = [];
  for (let i = 0; i < rows; i++) cmdSlice.push(commands[(cmdIndex + i) % commands.length]);
  fillPanel('terminal-content', cmdSlice, rows);

  // Syslog panel
  const logSlice = [];
  for (let i = 0; i < rows; i++) logSlice.push(logs[(logIndex + i) % logs.length]);
  fillPanel('syslog-content', logSlice, rows);

  // Netlog panel (offset setengah)
  const netSlice = [];
  const offset = Math.floor(logs.length / 2);
  for (let i = 0; i < rows; i++) netSlice.push(logs[(logIndex + offset + i) % logs.length]);
  fillPanel('netlog-content', netSlice, rows);

  logIndex = (logIndex + 1) % logs.length;
  cmdIndex = (cmdIndex + 1) % commands.length;
}

setInterval(tick, 150);
tick();
</script>
</body>
</html>
